name: Python CI
on: [push]
Jobs: 
build: 
runs-on: ubuntu-lastes
steps: 
- uses: actions/checkout@v4
- name: Set up Python
uses: actions/setup-python@v5
with:
python-version: "3.9"

-name: Install dependencies 
run: |
python -m pip install --upgrade pip
pip install -r requirements.txt

-name: Run flake8
run: flake8 . 

- name: Run pytest
run: pytest
